nrms:
  model_type: nrms
  title_size: 30
  his_size: 50
  npratio: 4
  data_format: news
  word_emb_dim: 300
  # nrms
  head_num: 20
  head_dim: 20
  # attention
  attention_hidden_dim: 200
  loss: cross_entropy_loss
  dropout: 0.2

  support_quick_scoring: True
  filter_num: 200
  window_size: 3
  vert_emb_dim: 100
  subvert_emb_dim: 100
  gru_unit: 400
  type: ini
  user_emb_dim: 50
  learning_rate: 0.0001
  optimizer: adam
  metrics: ['group_auc', 'mean_mrr', 'ndcg@5;10']